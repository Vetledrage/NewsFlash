spring:
  datasource:
    url: jdbc:h2:mem:scraperdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

scraper:
  enabled: true
  userAgent: "MyScraperBot/1.0 (contact: you@example.com)"
  baseUrl: "https://www.vg.no/"
